<style>
  :root {
    --teal-deep:  #1a4a65;
    --teal-mid:   #2a6a88;
    --teal-light: #3278a0;
    --teal-edge:  #143a52;
    --text:       #f1ead7;
    --text-muted: #c9d6dd;
    --accent:     #c9a96e;
    --accent-soft:#b08e54;
    --line:       rgba(241, 234, 215, 0.10);
    --serif:      'Cormorant Garamond', Georgia, serif;
    --sans:       'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none; }

  html, body { height: 100%; overflow: hidden; }

  body {
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    background:
      radial-gradient(ellipse at 50% 30%,
        var(--teal-light) 0%,
        var(--teal-mid) 35%,
        var(--teal-deep) 75%,
        var(--teal-edge) 100%),
      var(--teal-deep);
    background-attachment: fixed;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  .logo {
    width: 96px; height: 96px;
    margin-bottom: 24px;
    opacity: 0.95;
    filter: drop-shadow(0 6px 24px rgba(0,0,0,0.4));
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 12px;
  }

  .tagline {
    font-family: var(--serif);
    font-style: italic;
    color: var(--accent);
    letter-spacing: 0.12em;
    font-size: 16px;
    margin-bottom: 28px;
    opacity: 0.85;
  }

  .rule-gold {
    height: 1px; width: 180px;
    margin: 0 auto 24px auto;
    background: linear-gradient(to right, transparent, var(--accent), transparent);
  }

  .duration-row {
    display: flex; gap: 10px;
    margin-bottom: 28px;
  }
  .dur-btn {
    background: transparent;
    border: 1px solid rgba(201, 169, 110, 0.4);
    color: var(--text-muted);
    padding: 8px 18px;
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    border-radius: 999px;
    font-weight: 400;
    transition: all 0.2s ease;
    cursor: pointer;
    min-width: 0;
  }
  .dur-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(201, 169, 110, 0.08);
  }
  .dur-btn:active { background: var(--accent); color: var(--teal-deep); }

  .display {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 88px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--text);
    margin-bottom: 16px;
    text-shadow: 0 2px 24px rgba(10,30,45,0.5);
  }

  .stage {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--text-muted);
    min-height: 14px;
    margin-bottom: 44px;
    font-weight: 400;
  }

  .begin-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 16px 52px;
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    border-radius: 999px;
    font-weight: 500;
    transition: background 0.25s ease, color 0.25s ease;
    min-width: 200px;
    cursor: pointer;
  }
  .begin-btn:active { background: var(--accent); color: var(--teal-deep); }

  .ring {
    position: absolute; left: 50%; top: 50%;
    width: 360px; height: 360px;
    margin-left: -180px; margin-top: -180px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    opacity: 0; pointer-events: none;
  }
  .ring.pulse { animation: pulse 9s ease-out forwards; }
  @keyframes pulse {
    0%   { transform: scale(0.5); opacity: 0.55; }
    100% { transform: scale(2.0); opacity: 0;    }
  }
</style>
</head>

// 30-second preset bell after start, then the main bell at the chosen duration + 30s.
let durationMin = 20;
function bellSequence(min) {
  const end = min * 60 + 30;
  return [
    { at: 0,   gain: 0.65, freq: 196, label: 'Meditate' },
    { at: 30,  gain: 0.32, freq: 294, label: ''         },
    { at: end, gain: 0.40, freq: 175, label: 'Complete' },
  ];
}
let BELLS = bellSequence(durationMin);
let TOTAL = BELLS[BELLS.length - 1].at;

let ctx, startTime, rafId, wakeLock = null;
let state = 'ready';
let fired = BELLS.map(() => false);

const $display = document.getElementById('display');
const $stage   = document.getElementById('stage');
const $btn     = document.getElementById('btn');
const $ring    = document.getElementById('ring');
const $durRow  = document.getElementById('durRow');

function fmt(s) {
  s = Math.max(0, Math.ceil(s));
  const m = Math.floor(s / 60);
  const r = s % 60;
  return m + ':' + (r < 10 ? '0' : '') + r;
}

function bowl(when, gain, freq) {
  const partials = [
    { ratio: 1.00, decay: 12, amp: 1.00, beat: 0.5 },
    { ratio: 2.76, decay: 8,  amp: 0.50, beat: 0.7 },
    { ratio: 5.40, decay: 5,  amp: 0.25, beat: 0.9 },
    { ratio: 8.93, decay: 3,  amp: 0.12, beat: 1.1 },
  ];
  partials.forEach(p => {
    [0, p.beat].forEach(offset => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = freq * p.ratio + offset;
      g.gain.setValueAtTime(0, when);
      g.gain.linearRampToValueAtTime(gain * p.amp * 0.5, when + 0.04);
      g.gain.exponentialRampToValueAtTime(0.0001, when + p.decay);
      o.connect(g).connect(ctx.destination);
      o.start(when);
      o.stop(when + p.decay + 0.1);
    });
  });
  const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.015));
  }
  const src = ctx.createBufferSource();
  const filt = ctx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = 700;
  const sg = ctx.createGain();
  sg.gain.value = gain * 0.18;
  src.buffer = buf;
  src.connect(filt).connect(sg).connect(ctx.destination);
  src.start(when);
}

function pulse() {
  $ring.classList.remove('pulse');
  void $ring.offsetWidth;
  $ring.classList.add('pulse');
}

async function acquireWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }
  } catch (_) {}
}
async function releaseWakeLock() {
  if (wakeLock) { try { await wakeLock.release(); } catch (_) {} wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if (state === 'running' && document.visibilityState === 'visible' && !wakeLock) acquireWakeLock();
});

function setDuration(min) {
  durationMin = min;
  BELLS = bellSequence(min);
  TOTAL = BELLS[BELLS.length - 1].at;
  fired = BELLS.map(() => false);
  $display.textContent = fmt(TOTAL);
  document.querySelectorAll('.dur-btn').forEach(b => {
    b.classList.toggle('active', Number(b.dataset.min) === min);
  });
}

function tick() {
  const elapsed = (performance.now() - startTime) / 1000;
  $display.textContent = fmt(TOTAL - elapsed);
  BELLS.forEach((b, i) => {
    if (!fired[i] && elapsed >= b.at) {
      fired[i] = true;
      bowl(ctx.currentTime, b.gain, b.freq);
      pulse();
      if (b.label) $stage.textContent = b.label;
    }
  });
  if (elapsed >= TOTAL) { finish(); return; }
  rafId = requestAnimationFrame(tick);
}

function finish() {
  state = 'complete';
  $btn.textContent = 'Reset';
  releaseWakeLock();
}

function reset() {
  cancelAnimationFrame(rafId);
  fired = BELLS.map(() => false);
  $display.textContent = fmt(TOTAL);
  $stage.textContent = 'Ready';
  $btn.textContent = 'Begin';
  state = 'ready';
  releaseWakeLock();
  $durRow.style.opacity = '1';
  $durRow.style.pointerEvents = 'auto';
}

async function start() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (ctx.state === 'suspended') await ctx.resume();
  const s = ctx.createBufferSource();
  s.buffer = ctx.createBuffer(1, 1, 22050);
  s.connect(ctx.destination);
  s.start(0);

  state = 'running';
  startTime = performance.now();
  $btn.textContent = 'Stop';
  $stage.textContent = '';
  $durRow.style.opacity = '0.35';
  $durRow.style.pointerEvents = 'none';
  acquireWakeLock();
  tick();
}

$btn.addEventListener('click', () => {
  if (state === 'ready')         start();
  else if (state === 'running')  reset();
  else if (state === 'complete') reset();
});

$durRow.addEventListener('click', (e) => {
  const b = e.target.closest('.dur-btn');
  if (!b || state === 'running') return;
  setDuration(Number(b.dataset.min));
});

setDuration(20);
</script>
</body>
</html>
